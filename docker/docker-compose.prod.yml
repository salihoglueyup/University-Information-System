name: ubis-prod

services:
  # ─── Infrastructure ────────────────────────────────────────

  mongo:
    image: mongo:7
    container_name: ubis_mongo_prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_APP_USER: ${MONGO_APP_USER:-ubis_user}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "-u", "admin", "-p", "${MONGO_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: ubis_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ubis_rabbitmq_prod
    restart: unless-stopped
    # Management port NOT exposed in production
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: ubis_meilisearch_prod
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}
    volumes:
      - meili_data:/meili_data/data.ms
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Application ───────────────────────────────────────────

  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
      target: production
    container_name: ubis_server_prod
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-5001}:5000"
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URL: mongodb://${MONGO_APP_USER:-ubis_user}:${MONGO_APP_PASSWORD}@mongo:27017/ubis?authSource=ubis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      JWT_SEC: ${JWT_SEC:?JWT_SEC is required for production}
      CSRF_SECRET: ${CSRF_SECRET:?CSRF_SECRET is required for production}
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  client:
    build:
      context: ..
      dockerfile: docker/client.Dockerfile
      target: production
    container_name: ubis_client_prod
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-80}:80"
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─── Networks ──────────────────────────────────────────────

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────

volumes:
  mongo_data:
  redis_data:
  meili_data:
  rabbitmq_data:
