name: ubis-prod

services:
  mongo:
    image: mongo:7
    container_name: ubis_mongo_prod
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ubis_redis_prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ubis_rabbitmq_prod
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: ubis_meilisearch_prod
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
    volumes:
      - meili_data:/meili_data/data.ms

  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
      target: production
    container_name: ubis_server_prod
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      meilisearch:
        condition: service_started
    ports:
      - "${SERVER_PORT:-5001}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URL: mongodb://mongo:27017/ubis
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLIENT_URL: ${CLIENT_URL:-http://localhost}

  client:
    build:
      context: ..
      dockerfile: docker/client.Dockerfile
      target: production
    container_name: ubis_client_prod
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-5173}:80"

volumes:
  mongo_data:
  redis_data:
  meili_data:
  rabbitmq_data:
