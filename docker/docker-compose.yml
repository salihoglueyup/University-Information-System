name: ubis-dev

services:
  # ─── Infrastructure ────────────────────────────────────────

  mongo:
    image: mongo:7
    container_name: ubis_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ubis_redis
    restart: unless-stopped
    # Port only exposed internally in Docker network
    # Removed host exposure to prevent cross-protocol attacks
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ubis_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"       # Management UI — dev only
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: ubis_meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
    volumes:
      - meili_data:/meili_data/data.ms
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Application ───────────────────────────────────────────

  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
      target: development
    container_name: ubis_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-5000}:5000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URL: mongodb://mongo:27017/ubis
      REDIS_URL: redis://redis:6379
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      RABBITMQ_URL: amqp://rabbitmq:5672
      CLIENT_URL: http://localhost:5173
      JWT_SEC: ${JWT_SEC:-ubis_jwt_secret_dev_only}
      CSRF_SECRET: ${CSRF_SECRET:-ubis_csrf_secret_dev_only}
    volumes:
      - ../server:/app
      - server_node_modules:/app/node_modules
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  client:
    build:
      context: ..
      dockerfile: docker/client.Dockerfile
      target: development
    container_name: ubis_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    environment:
      VITE_DEV_PROXY_TARGET: http://server:5000
    volumes:
      - ../client:/app
      - client_node_modules:/app/node_modules
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Optional Services (activate with --profile) ───────────

  # Nginx API Gateway
  # Usage: docker compose --profile gateway up -d
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: ubis_nginx_gateway
    restart: unless-stopped
    profiles:
      - gateway
    depends_on:
      - client
      - server
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

# ─── Networks ──────────────────────────────────────────────

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────

volumes:
  mongo_data:
  redis_data:
  meili_data:
  rabbitmq_data:
  server_node_modules:
  client_node_modules:
