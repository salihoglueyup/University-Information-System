apiVersion: apps/v1
kind: Deployment
metadata:
  name: ubis-backend-deployment
  labels:
    app: ubis-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ubis-backend
  template:
    metadata:
      labels:
        app: ubis-backend
    spec:
      containers:
      - name: ubis-server
        image: yourdockerhubuser/ubis-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: ubis-secrets
              key: mongo-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ubis-secrets
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/csrf-token
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
